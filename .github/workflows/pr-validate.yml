name: PR Validation (SQL Lint + Guardrails)

on:
  pull_request:
    branches: [ DEV, UAT, PROD ]
    paths:
      - "migrations/**"
      - ".sqlfluff"
      - ".github/scripts/**"

jobs:
  validate:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Debug ref
        run: |
          echo "github.ref=${{ github.ref }}"
          echo "github.head_ref=${{ github.head_ref }}"
          echo "github.base_ref=${{ github.base_ref }}"
          git rev-parse --abbrev-ref HEAD
          git rev-parse HEAD
          git log -1 --oneline

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install linters
        run: |
          pip install sqlfluff==3.0.7

      - name: Determine changed SQL files
        id: changed_sql
        run: |
          set -e
          echo "Fetching base branch: ${{ github.base_ref }}"
          git fetch --no-tags --prune --depth=1 origin "${{ github.base_ref }}"

          CHANGED_SQL=$(git diff --name-only "origin/${{ github.base_ref }}"...HEAD -- 'migrations/*.sql' || true)

          echo "Changed SQL files:"
          echo "$CHANGED_SQL"

          # Write output for later steps
          {
            echo "files<<EOF"
            echo "$CHANGED_SQL"
            echo "EOF"
          } >> "$GITHUB_OUTPUT"

      - name: SQLFluff lint (only changed files)
        run: |
          FILES="${{ steps.changed_sql.outputs.files }}"

          if [ -z "$FILES" ]; then
            echo "No SQL files changed in migrations/. Skipping sqlfluff."
            exit 0
          fi

          # shellcheck disable=SC2086
          sqlfluff lint $FILES --dialect snowflake

      - name: Guardrails - block destructive SQL (only changed files)
        run: |
          FILES="${{ steps.changed_sql.outputs.files }}"

          if [ -z "$FILES" ]; then
            echo "No SQL files changed in migrations/. Skipping guardrails."
            exit 0
          fi

          # If your sql_guard.py accepts multiple file paths, this is perfect:
          # python .github/scripts/sql_guard.py <file1> <file2> ...
          # shellcheck disable=SC2086
          python .github/scripts/sql_guard.py $FILES
