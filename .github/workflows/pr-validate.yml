name: PR Validation (SQL Lint + Guardrails)

on:
  pull_request:
    branches: [ DEV, UAT, PROD ]
    paths:
      - "migrations/**"
      - ".sqlfluff"
      - ".github/scripts/**"

jobs:
  validate:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install linters
        run: |
          pip install sqlfluff==3.0.7

      - name: SQLFluff lint (Snowflake)
        run: |
          sqlfluff lint migrations --dialect snowflake

      - name: Guardrails - block destructive SQL
        run: |
          python .github/scripts/sql_guard.py migrations
